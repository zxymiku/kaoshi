<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台控制台 - 考试计时</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .admin-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
      position: relative;
      z-index: 1;
    }
    .admin-header {
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .admin-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .full-width {
      grid-column: 1 / -1;
    }
    .card {
      background: var(--bg-card);
      -webkit-backdrop-filter: blur(var(--card-blur));
      backdrop-filter: blur(var(--card-blur));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
    }
    .card-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 20px;
      color: var(--text-primary);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-control {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
      background: var(--bg-color);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    textarea.form-control {
      min-height: 250px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      resize: vertical;
      line-height: 1.5;
    }
    .button-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .theme-toggle {
      display: flex;
      gap: 20px;
      padding: 8px 0;
    }
    .theme-toggle label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 500;
      color: var(--text-primary);
    }
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 14px 28px;
      border-radius: 999px;
      background: var(--text-primary);
      color: var(--bg-color);
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-subtle);
      padding-bottom: 8px;
    }
    .tab-btn {
      background: transparent;
      border: none;
      padding: 8px 16px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: white;
    }
    .tab-pane {
      display: none;
    }
    .tab-pane.active {
      display: block;
    }
    
    /* Visual Editor Styles */
    .editor-exam {
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.02);
    }
    .editor-exam-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .editor-subject {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      align-items: end;
      border-top: 1px dashed var(--border-subtle);
      padding-top: 12px;
      margin-top: 12px;
    }
    
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .admin-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
      .card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>
  <main class="admin-container">
    <div class="admin-header">
      <h1 class="admin-title">控制台</h1>
      <a href="../index.html" class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        返回主页
      </a>
    </div>

    <div class="grid">
      <div class="card full-width">
        <h2 class="card-title">配置编辑器</h2>
        
        <div class="tabs">
          <button class="tab-btn active" data-target="tab-visual">可视化编辑</button>
          <button class="tab-btn" data-target="tab-json">JSON 源码</button>
        </div>

        <div id="tab-visual" class="tab-pane active">
          <div class="form-group">
            <label>全局标题</label>
            <input type="text" id="ve-title" class="form-control" placeholder="例如：考试计时">
          </div>
          <div id="ve-exams-container"></div>
          <button class="btn btn-secondary" id="ve-add-exam" style="margin-top: 10px;">+ 添加考试类型</button>
        </div>

        <div id="tab-json" class="tab-pane">
          <div class="form-group">
            <label for="config-json">配置文件内容 (本地覆盖优先)</label>
            <textarea id="config-json" class="form-control" placeholder="正在加载配置..."></textarea>
          </div>
          <div class="form-group">
            <label for="config-file">或从本地文件上传 (.json)</label>
            <input type="file" id="config-file" accept=".json" class="form-control" style="padding: 10px;">
          </div>
        </div>

        <div class="button-group" style="border-top: 1px solid var(--border-subtle); padding-top: 20px; margin-top: 30px;">
          <button class="btn btn-primary" id="save-config">保存并应用配置</button>
          <button class="btn btn-secondary" id="load-remote-config">重置并加载远程配置</button>
          <button class="btn btn-danger" id="clear-config">清除本地缓存</button>
        </div>
      </div>

      <div class="card">
        <h2 class="card-title">背景设置</h2>
        <div class="form-group">
          <label for="bg-url">自定义背景图片 URL</label>
          <input type="text" id="bg-url" class="form-control" placeholder="留空则使用配置文件中的默认值">
        </div>
        <div class="button-group">
          <button class="btn btn-primary" id="save-bg">保存背景</button>
          <button class="btn btn-secondary" id="clear-bg">清除</button>
        </div>
      </div>

      <div class="card">
        <h2 class="card-title">主题设置</h2>
        <div class="form-group">
          <label>界面色彩模式</label>
          <div class="theme-toggle">
            <label><input type="radio" name="theme" value="light"> 亮色</label>
            <label><input type="radio" name="theme" value="dark"> 暗色</label>
            <label><input type="radio" name="theme" value=""> 跟随系统</label>
          </div>
        </div>
      </div>
    </div>
  </main>
  
  <div class="toast" id="toast"></div>

  <script src="../js/config.js"></script>
  <script src="../js/settings.js"></script>
</body>
</html>
