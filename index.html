<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考试计时</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;600;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-image" id="bg-image"></div>
  <div class="bg-overlay"></div>

  <main class="container">
    <header class="page-header">
      <div class="header-top">
        <h1 class="page-title" id="page-title">考试计时</h1>
      </div>
      <div class="clock-display">
        <div class="clock-time" id="current-time">--:--:--</div>
      </div>
    </header>
    <div id="exam-container"></div>
  </main>
  <div class="bg-switcher" id="bg-switcher">
    <div class="bg-switcher-popup" id="bg-switcher-popup">
      <div class="bg-selector">
        <button class="bg-arrow" id="bg-prev">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
        </button>
        <div class="bg-name-wrapper"><div class="bg-name" id="bg-name"></div></div>
        <button class="bg-arrow" id="bg-next">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
      </div>
      <button class="btn btn-primary" id="bg-apply" style="padding: 8px 16px; font-size: 0.9rem;">应用</button>
    </div>
    <button class="btn btn-secondary bg-switcher-button" id="bg-switcher-toggle">
      <img src="assets/backgroundswitch.png" alt="背景切换" />
    </button>
  </div>
  <script src="js/utils.js"></script>
  <script src="js/config.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/render.js"></script>
  <script src="js/bg-picker.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
